<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webtoon Downloader</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Effet de cercles lumineux en arrière-plan */
        .blur-circle {
            position: absolute;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .circle-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .circle-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; }

        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(0, 0, 0, 0.3);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: var(--text-muted);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Animation de chargement */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #statusMessage {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            line-height: 1.4;
            text-align: left;
        }

        .msg-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .msg-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
    </style>
</head>
<body>

    <div class="blur-circle circle-1"></div>
    <div class="blur-circle circle-2"></div>

    <div class="container">
        <h1>Webtoon Extractor</h1>
        <p class="subtitle">Convertissez vos séries préférées au format CBZ pour Kobo</p>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Collez l'adresse du Webtoon ici...">
        </div>

        <button id="downloadBtn" onclick="triggerDownload()">
            <span class="spinner" id="btnSpinner"></span>
            <span id="btnText">Télécharger en CBZ</span>
        </button>

        <div id="statusMessage"></div>
    </div>

    <script>
        async function triggerDownload() {
            const urlInput = document.getElementById('urlInput');
            const downloadBtn = document.getElementById('downloadBtn');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const statusMessage = document.getElementById('statusMessage');

            const url = urlInput.value.trim();

            if (!url) {
                showStatus("Veuillez entrer une URL valide.", "error");
                return;
            }

            // Verrouillage de l'interface pendant l'extraction
            urlInput.disabled = true;
            downloadBtn.disabled = true;
            btnSpinner.style.display = 'block';
            btnText.innerText = 'Extraction en cours...';
            statusMessage.style.display = 'none';

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(data.message, "success");
                    urlInput.value = ''; // On vide le champ si c'est réussi
                } else {
                    showStatus(data.detail || "Une erreur est survenue lors du processus.", "error");
                }
            } catch (error) {
                showStatus("Impossible de joindre le serveur local.", "error");
            } finally {
                // Libération de l'interface
                urlInput.disabled = false;
                downloadBtn.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.innerText = 'Télécharger en CBZ';
            }
        }

        function showStatus(text, type) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.innerText = text;
            statusMessage.className = type === "success" ? "msg-success" : "msg-error";
            statusMessage.style.display = 'block';
        }
    </script>
</body>
</html>
