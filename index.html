<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webtoon Downloader Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --success-hover: #059669;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .blur-circle { position: absolute; background: rgba(99, 102, 241, 0.15); border-radius: 50%; filter: blur(80px); z-index: 0; }
        .circle-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .circle-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; }

        .container { position: relative; z-index: 1; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 3rem; border-radius: 24px; width: 100%; max-width: 540px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; }
        h1 { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.05em; margin-bottom: 0.5rem; background: linear-gradient(to right, #ffffff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2.5rem; }

        input[type="text"] { width: 100%; padding: 1rem 1.25rem; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-main); font-size: 1rem; outline: none; margin-bottom: 1.5rem; transition: all 0.3s; }
        input[type="text"]:focus { border-color: var(--accent); }

        button { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .progress-zone { display: none; margin-top: 2rem; text-align: left; }
        .progress-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        
        .progress-bar-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 999px; overflow: hidden; position: relative; }
        /* Animation de chargement infini */
        .progress-bar-fill { width: 40%; height: 100%; background: linear-gradient(to right, #6366f1, #a5b4fc); border-radius: 999px; position: absolute; animation: moveProgress 1.5s infinite ease-in-out; }
        
        @keyframes moveProgress {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        #actionBtnZone { display: none; margin-top: 2rem; }
        .success-btn { background: var(--success); box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3); }
        .success-btn:hover { background: var(--success-hover); }

        #statusMessage { margin-top: 1.5rem; padding: 1rem; border-radius: 12px; font-size: 0.9rem; display: none; }
        .msg-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; text-align: left; }
    </style>
</head>
<body>

    <div class="blur-circle circle-1"></div>
    <div class="blur-circle circle-2"></div>

    <div class="container">
        <h1>Webtoon Extractor</h1>
        <p class="subtitle">Hébergé sur le Cloud — Prêt à extraire</p>
        
        <input type="text" id="urlInput" placeholder="Collez l'adresse complète (avec https://)...">
        <button id="startBtn" onclick="startExtraction()">Analyser et extraire</button>

        <div class="progress-zone" id="progressZone">
            <div class="progress-label" id="progressState">Extraction et packaging sur le serveur Cloud...</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <div id="actionBtnZone">
            <button class="success-btn" id="finalDownloadBtn">💾 Télécharger le fichier .CBZ</button>
        </div>

        <div id="statusMessage" class="msg-error"></div>
    </div>

    <script>
        async function startExtraction() {
            const urlInput = document.getElementById('urlInput');
            const startBtn = document.getElementById('startBtn');
            const progressZone = document.getElementById('progressZone');
            const actionBtnZone = document.getElementById('actionBtnZone');
            const statusMessage = document.getElementById('statusMessage');

            let url = urlInput.value.trim();
            if (!url) {
                alert("Veuillez entrer une URL.");
                return;
            }

            // Correction automatique si le protocole manque
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            urlInput.disabled = true;
            startBtn.disabled = true;
            statusMessage.style.display = 'none';
            actionBtnZone.style.display = 'none';
            progressZone.style.display = 'block';

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (response.ok && data.status === "success") {
                    progressZone.style.display = 'none';
                    const finalBtn = document.getElementById('finalDownloadBtn');
                    finalBtn.onclick = () => {
                        window.location.href = `/get-file?filename=${encodeURIComponent(data.filename)}`;
                    };
                    actionBtnZone.style.display = 'block';
                } else {
                    progressZone.style.display = 'none';
                    statusMessage.innerText = data.detail || "Une erreur est survenue pendant l'extraction.";
                    statusMessage.style.display = 'block';
                }
            } catch (error) {
                progressZone.style.display = 'none';
                statusMessage.innerText = "Impossible de joindre le serveur ou le délai d'attente est dépassé.";
                statusMessage.style.display = 'block';
            } finally {
                urlInput.disabled = false;
                startBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
