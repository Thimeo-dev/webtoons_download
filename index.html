<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webtoon Downloader Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --success-hover: #059669;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .blur-circle {
            position: absolute;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .circle-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .circle-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; }

        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            margin-bottom: 1.5rem;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Zone de progression */
        .progress-zone {
            display: none;
            margin-top: 2rem;
            text-align: left;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #6366f1, #a5b4fc);
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        /* Bouton de téléchargement final */
        #actionBtnZone {
            display: none;
            margin-top: 2rem;
        }

        .success-btn {
            background: var(--success);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .success-btn:hover { background: var(--success-hover); }

        #statusMessage {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
        }
        .msg-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; text-align: left; }
    </style>
</head>
<body>

    <div class="blur-circle circle-1"></div>
    <div class="blur-circle circle-2"></div>

    <div class="container">
        <h1>Webtoon Extractor</h1>
        <p class="subtitle">Suivez vos téléchargements en temps réel</p>
        
        <input type="text" id="urlInput" placeholder="Collez l'adresse du Webtoon ici...">
        <button id="startBtn" onclick="startExtraction()">Analyser et extraire</button>

        <div class="progress-zone" id="progressZone">
            <div class="progress-label">
                <span id="progressState">Téléchargement des images...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>

        <div id="actionBtnZone">
            <button class="success-btn" id="finalDownloadBtn">💾 Télécharger le fichier .CBZ</button>
        </div>

        <div id="statusMessage" class="msg-error"></div>
    </div>

    <script>
        let eventSource = null;

        function startExtraction() {
            const urlInput = document.getElementById('urlInput');
            const startBtn = document.getElementById('startBtn');
            const progressZone = document.getElementById('progressZone');
            const progressBarFill = document.getElementById('progressBarFill');
            const progressPercent = document.getElementById('progressPercent');
            const progressState = document.getElementById('progressState');
            const actionBtnZone = document.getElementById('actionBtnZone');
            const statusMessage = document.getElementById('statusMessage');

            const url = urlInput.value.trim();
            if (!url) {
                alert("Veuillez entrer une URL.");
                return;
            }

            // Reset de l'interface
            urlInput.disabled = true;
            startBtn.disabled = true;
            statusMessage.style.display = 'none';
            actionBtnZone.style.display = 'none';
            
            progressZone.style.display = 'block';
            progressBarFill.style.width = '0%';
            progressPercent.innerText = '0%';
            progressState.innerText = 'Initialisation...';

            // Connexion SSE au flux de progression FastAPI
            eventSource = new EventSource(`/progress?url=${encodeURIComponent(url)}`);

            eventSource.addEventListener('progress', (e) => {
                const percent = e.data;
                progressBarFill.style.width = `${percent}%`;
                progressPercent.innerText = `${percent}%`;
                progressState.innerText = 'Téléchargement des pages...';
            });

            eventSource.addEventListener('status', (e) => {
                progressState.innerText = e.data;
            });

            eventSource.addEventListener('done', (e) => {
                const filename = e.data;
                progressState.innerText = 'Extraction complétée avec succès !';
                progressBarFill.style.width = '100%';
                progressPercent.innerText = '100%';
                
                // On configure le gros bouton vert de téléchargement
                const finalBtn = document.getElementById('finalDownloadBtn');
                finalBtn.onclick = () => {
                    window.location.href = `/get-file?filename=${encodeURIComponent(filename)}`;
                };
                
                actionBtnZone.style.display = 'block';
                closeConnection();
                urlInput.disabled = false;
                startBtn.disabled = false;
            });

            eventSource.addEventListener('error', (e) => {
                statusMessage.innerText = e.data;
                statusMessage.style.display = 'block';
                progressZone.style.display = 'none';
                closeConnection();
                urlInput.disabled = false;
                startBtn.disabled = false;
            });

            eventSource.onerror = () => {
                statusMessage.innerText = "Une erreur de connexion est survenue avec le flux du serveur.";
                statusMessage.style.display = 'block';
                closeConnection();
                urlInput.disabled = false;
                startBtn.disabled = false;
            };
        }

        function closeConnection() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }
    </script>
</body>
</html>
